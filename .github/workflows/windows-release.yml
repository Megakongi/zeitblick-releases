name: Build & Publish Release

# Baut die Plattform-Installer nativ (Windows-NSIS auf windows-latest,
# macOS-DMG auf macos-latest) und veröffentlicht sie am passenden GitHub-Release:
#   Windows: .exe, .blockmap, latest.yml
#   macOS:   .dmg (+ .blockmap), -mac.zip (+ .blockmap), latest-mac.yml
# Läuft automatisch bei Push eines v*-Tags oder manuell via "Run workflow"
# (mit Angabe des Tags, z. B. v1.6.0, um ein bestehendes Release zu ergänzen).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag oder Branch zum Bauen (z. B. v1.6.0)'
        required: true
        default: 'v1.6.0'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron-builders eigener GitHub-Publisher lädt die große .exe
      # unzuverlässig hoch (Race beim Anlegen des Releases) und meldet den Step
      # trotzdem als erfolgreich. Daher: nur bauen (kein Auto-Publish) …
      - name: Build Windows installer
        run: npm run build:win -- --publish never

      # … und Artefakte deterministisch + verifiziert per gh CLI hochladen.
      # Dateinamen on-disk sind dank nsis.artifactName bereits hypheniert und
      # passen damit zu den URLs in latest.yml (Auto-Update).
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.ref || github.ref_name }}"
          VER="${TAG#v}"
          EXE="release/ZeitBlick-Setup-${VER}.exe"
          MAP="release/ZeitBlick-Setup-${VER}.exe.blockmap"
          YML="release/latest.yml"
          for f in "$EXE" "$MAP" "$YML"; do
            [ -f "$f" ] || { echo "::error::Erwartetes Artefakt fehlt: $f"; ls -la release; exit 1; }
          done
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automatischer Build für $TAG"
          gh release upload "$TAG" "$EXE" "$MAP" "$YML" --clobber
          echo "Veröffentlichte Assets:"
          gh release view "$TAG" --json assets --jq '.assets[] | "\(.name)  \(.size) bytes  \(.state)"'
          # Sicherstellen, dass die .exe wirklich als 'uploaded' anliegt.
          gh release view "$TAG" --json assets \
            --jq '.assets[] | select(.name=="ZeitBlick-Setup-'"$VER"'.exe" and .state=="uploaded") | .name' \
            | grep -q . || { echo "::error::.exe wurde nicht vollständig veröffentlicht"; exit 1; }

  macos:
    # Läuft nach dem Windows-Job, damit das Release garantiert existiert und
    # beide Jobs nicht gleichzeitig `gh release create` aufrufen (Race).
    needs: windows
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Universal-DMG bauen, ohne Auto-Publish. Der Build ist unsigniert
      # (build.mac.identity = null), daher kein Signing-Secret nötig.
      - name: Build macOS DMG
        run: npm run build:mac -- --publish never

      # DMG + latest-mac.yml deterministisch hochladen. Die SHA512 in
      # latest-mac.yml stammt aus genau diesem Build und wird vom In-App-Updater
      # gegen den heruntergeladenen DMG verifiziert (main.js).
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.ref || github.ref_name }}"
          VER="${TAG#v}"
          DMG="release/ZeitBlick-${VER}-universal.dmg"
          YML="release/latest-mac.yml"
          # Pflicht-Artefakte: ohne diese funktioniert das Mac-Auto-Update nicht.
          for f in "$DMG" "$YML"; do
            [ -f "$f" ] || { echo "::error::Erwartetes Artefakt fehlt: $f"; ls -la release; exit 1; }
          done
          # Optionale Begleit-Artefakte (Blockmap, Zip) mitnehmen, falls vorhanden.
          UPLOADS=("$DMG" "$YML")
          for opt in \
            "release/ZeitBlick-${VER}-universal.dmg.blockmap" \
            "release/ZeitBlick-${VER}-universal-mac.zip" \
            "release/ZeitBlick-${VER}-universal-mac.zip.blockmap"; do
            [ -f "$opt" ] && UPLOADS+=("$opt")
          done
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Automatischer Build für $TAG"
          gh release upload "$TAG" "${UPLOADS[@]}" --clobber
          echo "Veröffentlichte Assets:"
          gh release view "$TAG" --json assets --jq '.assets[] | "\(.name)  \(.size) bytes  \(.state)"'
          # Sicherstellen, dass der DMG wirklich als 'uploaded' anliegt.
          gh release view "$TAG" --json assets \
            --jq '.assets[] | select(.name=="ZeitBlick-'"$VER"'-universal.dmg" and .state=="uploaded") | .name' \
            | grep -q . || { echo "::error::DMG wurde nicht vollständig veröffentlicht"; exit 1; }
